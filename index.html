<!-- Run: node server.js then open http://localhost:3000 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Audi S3</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden}
    canvas{display:block}
    #ui{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font:bold 14px Arial;letter-spacing:2px;opacity:.6;pointer-events:none}
    #minimap{position:fixed;bottom:20px;right:20px;width:140px;height:140px;background:rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.25);border-radius:8px;pointer-events:none}
    #minimap canvas{width:100%;height:100%}
    #speed{position:fixed;bottom:20px;left:20px;color:#fff;font:bold 18px Arial;opacity:.8;pointer-events:none}
    #signals{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:40px;pointer-events:none}
    .sig{font-size:28px;opacity:.2;transition:opacity .1s}
    .sig.on{opacity:1;filter:drop-shadow(0 0 8px #ff9900)}
    #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);z-index:100;color:#fff;font-family:Arial,sans-serif;text-align:center}
    #overlay h1{font-size:3rem;letter-spacing:6px;margin-bottom:.75rem;text-transform:uppercase}
    #overlay h2{font-size:2.2rem;letter-spacing:4px;margin-bottom:.75rem;text-transform:uppercase}
    #overlay p{font-size:1rem;opacity:.75;letter-spacing:2px}
    #mission-prompt{display:none;position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.7);color:#ffdd00;font:bold 13px Arial;letter-spacing:2px;
      padding:8px 18px;border:1px solid #ffdd00;border-radius:4px;pointer-events:none}
    #nav-arrow{display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);
      flex-direction:column;align-items:center;color:#ffdd00;pointer-events:none;z-index:50}
    #nav-arrow-icon{font-size:48px;line-height:1}
    #nav-dist{font:bold 13px Arial;letter-spacing:1px;margin-top:2px}
  </style>
</head>
<body>
<div id="ui">WASD / ARROWS — DRIVE</div>
<div id="signals">
  <span class="sig" id="sigL">◀</span>
  <span class="sig" id="sigR">▶</span>
</div>
<div id="minimap"><canvas id="mmCanvas" width="140" height="140"></canvas></div>
<div id="speed">0 km/h</div>
<div id="mission-prompt">Press F to start mission</div>
<div id="nav-arrow">
  <div id="nav-arrow-icon">▲</div>
  <div id="nav-dist"></div>
</div>
<div id="overlay">
  <div id="overlay-menu">
    <h1>Car Drive</h1>
    <p>Press Enter to play</p>
  </div>
  <div id="overlay-pause" style="display:none">
    <h2>Paused</h2>
    <p>Press Escape to resume</p>
  </div>
</div>
<script type="importmap">{"imports":{
  "three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
  "three/examples/jsm/loaders/GLTFLoader":"https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js"
}}</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
